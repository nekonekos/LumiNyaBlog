# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: LumiNya 的博客                # 站点标题
subtitle: '二次元·编程·日常'          # 副标题
description: '一个初中生的编程与生活记录，分享二次元、代码和有趣的想法。'  # 站点描述
keywords: 
  - 初中生
  - 编程
  - 二次元
  - 域名收藏
author: LumiNya                      # 作者名
language: zh-CN                      # 语言（中文）
timezone: 'Asia/Shanghai'             # 时区（可根据需要调整）

# URL
## 如果您的博客部署在自定义域名下，请修改 url 为实际地址
url: https://blog.luminya.cc
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: luminya    # 使用 LumiNya 主题

# Deployment
## 如果您使用 GitHub Pages 等部署方式，请在此配置
deploy:
  type: ''